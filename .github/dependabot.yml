version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      semantic-release:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"
      biome:
        patterns:
          - "@biomejs/*"
      remark:
        patterns:
          - "remark"
          - "remark-*"
          - "unified"
      types:
        patterns:
          - "@types/*"
    ignore:
      # Peer-dependency; bump intentionally, not automatically.
      - dependency-name: "@rspress/core"
      - dependency-name: "typescript"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore"
      include: scope
