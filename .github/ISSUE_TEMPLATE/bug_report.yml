name: Bug report
description: Report a problem with the plugin
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Before submitting, please confirm:
        - You are on the latest version of the plugin
        - You have searched existing issues for duplicates
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: The value of `rspress-plugin-obsidian-wikilink` in your `package.json`
      placeholder: "0.1.1"
    validations:
      required: true
  - type: input
    id: rspress-version
    attributes:
      label: "@rspress/core version"
      placeholder: "2.0.8"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js / Bun version
      placeholder: "Node 22.14.0 / Bun 1.3.12"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other (specify below)
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Plugin configuration
      description: The `pluginObsidianWikiLink({...})` block from your `rspress.config.ts`
      render: ts
    validations:
      required: true
  - type: textarea
    id: markdown
    attributes:
      label: Minimal markdown reproduction
      description: A small `.md` file (or two) that triggers the issue
      render: markdown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error output or rendered HTML difference
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, workarounds you've tried
