name: Question
description: Ask a question about usage or integration
title: "[question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For general usage questions, please check the [README](../../blob/main/README.md) and [docs site](https://github.com/Jacob-Valor/rspress-plugin-obsidian-wikilink#readme) first. Open an issue only when the existing docs don't answer your question.
  - type: textarea
    id: question
    attributes:
      label: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you tried?
      description: Include relevant config, markdown, or error output
  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: "plugin 0.1.1, @rspress/core 2.0.8, Bun 1.3.12"
